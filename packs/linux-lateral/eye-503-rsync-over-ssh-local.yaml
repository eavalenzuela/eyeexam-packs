id: eye-503-rsync-over-ssh-local
name: rsync over ssh to localhost
description: |
  Mimics T1021.004: rsync with -e ssh to localhost. The rsync-over-ssh
  process invocation is the slither signal. Source and destination both
  under /tmp/eyeexam-503. Skips cleanly if rsync / ssh is unavailable.

attack:
  technique: T1021.004
  tactic: TA0008

destructiveness: low
platforms: [linux]

execute:
  - shell: bash
    command: |
      mkdir -p /tmp/eyeexam-503/src /tmp/eyeexam-503/dst
      printf 'eye-503 marker\n' > /tmp/eyeexam-503/src/marker
      if ! command -v rsync >/dev/null 2>&1 || ! command -v ssh >/dev/null 2>&1; then
        echo "rsync or ssh not installed; skipping" > /tmp/eyeexam-503/out
        exit 0
      fi
      if ! (exec 3<>/dev/tcp/127.0.0.1/22) 2>/dev/null; then
        echo "sshd not listening on 127.0.0.1:22; skipping" > /tmp/eyeexam-503/out
        exit 0
      fi
      rsync -e "ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o ConnectTimeout=2" \
        /tmp/eyeexam-503/src/marker localhost:/tmp/eyeexam-503/dst/marker \
        > /tmp/eyeexam-503/rsync.out 2>&1 || true
      echo "eye-503 rsync attempt complete"

cleanup:
  - shell: bash
    command: |
      rm -rf /tmp/eyeexam-503

verify_cleanup:
  - shell: bash
    command: |
      test ! -e /tmp/eyeexam-503

expected_detections:
  - sigma_id: 8b7c4d00-0001-4000-8000-00000000002a
    backend: slither
    description: proc-rsync-over-ssh — rsync with -e ssh
