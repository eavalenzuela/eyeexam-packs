id: eye-307-cloud-metadata-probe
name: Cloud instance metadata probe
description: |
  Mimics T1552.005 (Unsecured Credentials: Cloud Instance Metadata API):
  curl to 169.254.169.254 with a 2s timeout. Expected to fail in a
  homelab — the request itself (DNS / connect attempt to the IMDS IP) is
  the signal slither's net-cloud-metadata-egress rule keys on. No
  credentials are actually fetched.

attack:
  technique: T1552.005
  tactic: TA0006

destructiveness: low
platforms: [linux]

execute:
  - shell: bash
    command: |
      mkdir -p /tmp/eyeexam-307
      curl -sS -m 2 -o /tmp/eyeexam-307/imds.out \
        http://169.254.169.254/latest/meta-data/ 2>&1 || true
      echo "eye-307 imds probe complete"

cleanup:
  - shell: bash
    command: |
      rm -rf /tmp/eyeexam-307

verify_cleanup:
  - shell: bash
    command: |
      test ! -e /tmp/eyeexam-307

expected_detections:
  - sigma_id: 8b7c4d00-0001-4000-8000-000000000012
    backend: slither
    description: net-cloud-metadata-egress — pre-existing slither rule, fires on the connect attempt to 169.254.169.254
