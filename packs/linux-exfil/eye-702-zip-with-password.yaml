id: eye-702-zip-with-password
name: zip a sandbox file with a password
description: |
  Mimics T1560.002 (Archive via Library): zip -P creates an
  AES/ZipCrypto encrypted archive — the encryption-on-stage primitive
  used to bypass DLP / EDR content inspection on exfil paths. The -P
  flag is the slither signal. Skips cleanly if zip is not installed.

attack:
  technique: T1560.002
  tactic: TA0009

destructiveness: low
platforms: [linux]

execute:
  - shell: bash
    command: |
      mkdir -p /tmp/eyeexam-702
      printf 'eye-702 sensitive-looking content\n' > /tmp/eyeexam-702/data.txt
      if ! command -v zip >/dev/null 2>&1; then
        echo "zip not installed; skipping" > /tmp/eyeexam-702/out
        exit 0
      fi
      zip -P 'eyeexam-702-weakpw' /tmp/eyeexam-702/loot.zip /tmp/eyeexam-702/data.txt \
        > /tmp/eyeexam-702/zip.out 2>&1
      test -s /tmp/eyeexam-702/loot.zip && echo "eye-702 encrypted archive staged"

cleanup:
  - shell: bash
    command: |
      rm -rf /tmp/eyeexam-702

verify_cleanup:
  - shell: bash
    command: |
      test ! -e /tmp/eyeexam-702

expected_detections:
  - sigma_id: 8b7c4d00-0001-4000-8000-00000000002d
    backend: slither
    description: proc-zip-password-protected — zip -P invocation
