id: eye-403-bashrc-append
name: Append a marker alias to ~/.bashrc
description: |
  Mimics T1546.004 (Event Triggered Execution: Unix Shell Configuration
  Modification). Stages an undo, appends an 'eyeexam-403' marker alias, then
  restores the original. The append to ~/.bashrc is the file_event slither
  rule keys on. destructiveness=medium because it transiently modifies a
  real shell init file — verify_cleanup confirms the marker line is gone.

  Cleanup is idempotent and partial-execute-safe: the original is saved (or
  its absence recorded) BEFORE the file is touched, so an EDR that kills the
  test mid-run still leaves a revertible state — via the pack's own cleanup
  or `eyeexam runs cleanup <run-id>`.

attack:
  technique: T1546.004
  tactic: TA0003

destructiveness: medium
platforms: [linux]

execute:
  - shell: bash
    command: |
      d=/tmp/eyeexam-403
      mkdir -p "$d"
      # Stage the undo BEFORE modifying.
      if [ -e "$HOME/.bashrc" ]; then
        cp -p "$HOME/.bashrc" "$d/saved"
      else
        : > "$d/created"
      fi
      printf '\n# eyeexam-403\nalias eyeexam403marker="echo persistence"\n' \
        >> "$HOME/.bashrc"
      grep -q eyeexam-403 "$HOME/.bashrc" && echo "eye-403 bashrc marker added"

cleanup:
  - shell: bash
    command: |
      d=/tmp/eyeexam-403
      # Restore the saved original, or remove the file only if we created it;
      # leave it untouched if execute never modified it. Safe to re-run.
      if [ -f "$d/saved" ]; then
        cp -p "$d/saved" "$HOME/.bashrc"
      elif [ -f "$d/created" ]; then
        rm -f "$HOME/.bashrc"
      fi
      rm -rf "$d"

verify_cleanup:
  - shell: bash
    command: |
      test ! -e /tmp/eyeexam-403 || exit 1
      ! grep -q eyeexam-403 "$HOME/.bashrc" 2>/dev/null

expected_detections:
  - sigma_id: 8b7c4d00-0001-4000-8000-00000000000e
    backend: slither
    description: file-rc-persistence — file_event on ~/.bashrc
