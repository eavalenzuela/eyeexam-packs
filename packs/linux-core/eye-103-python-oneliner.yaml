id: eye-103-python-oneliner
name: Python -c one-liner writes a marker
description: |
  Mimics T1059.006: a one-shot python invocation used as a scripting
  interpreter. Argv contains the full -c payload — we use
  __import__('os') so the inline script carries a suspicious-token
  marker matching slither's tightened proc-python-inline-script rule
  (bare `python -c` is too noisy on managed hosts to score on its own).
  Writes a marker under /tmp/eyeexam-103.

attack:
  technique: T1059.006
  tactic: TA0002

destructiveness: low
platforms: [linux]

execute:
  - shell: bash
    command: |
      mkdir -p /tmp/eyeexam-103
      python3 -c "open('/tmp/eyeexam-103/marker','w').write(str(__import__('os').getpid()))" \
        || python -c "open('/tmp/eyeexam-103/marker','w').write(str(__import__('os').getpid()))"
      test -s /tmp/eyeexam-103/marker && echo "eye-103 marker written"

cleanup:
  - shell: bash
    command: |
      rm -rf /tmp/eyeexam-103

verify_cleanup:
  - shell: bash
    command: |
      test ! -e /tmp/eyeexam-103

expected_detections:
  - sigma_id: 8b7c4d00-0001-4000-8000-000000000014
    backend: slither
    description: proc-python-inline-script — python3 -c "..."
