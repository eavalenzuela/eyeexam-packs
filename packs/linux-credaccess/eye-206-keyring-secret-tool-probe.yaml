id: eye-206-keyring-secret-tool-probe
name: secret-tool keyring probe
description: |
  Mimics T1555 (Credentials from Password Stores) — invokes secret-tool
  (libsecret CLI). Calls --version only; no actual keyring search runs,
  but the binary invocation itself is the signal. Skips cleanly if
  secret-tool is not installed.

attack:
  technique: T1555
  tactic: TA0006

destructiveness: low
platforms: [linux]

execute:
  - shell: bash
    command: |
      mkdir -p /tmp/eyeexam-206
      if command -v secret-tool >/dev/null 2>&1; then
        secret-tool --version > /tmp/eyeexam-206/secret-tool.out 2>&1 || true
      else
        echo "secret-tool not installed; skipping invocation" \
          > /tmp/eyeexam-206/secret-tool.out
      fi
      echo "eye-206 keyring probe complete"

cleanup:
  - shell: bash
    command: |
      rm -rf /tmp/eyeexam-206

verify_cleanup:
  - shell: bash
    command: |
      test ! -e /tmp/eyeexam-206

expected_detections:
  - sigma_id: 8b7c4d00-0001-4000-8000-000000000020
    backend: slither
    description: proc-keyring-secret-tool — fires on any secret-tool invocation
